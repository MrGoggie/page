<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Welcome</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#00c6ff);
background-size:400% 400%;
animation:bg 10s infinite ease;
color:white;
text-align:center;
}

@keyframes bg{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.container{

animation:fade 2s ease;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

h1{

font-size:60px;
letter-spacing:3px;
animation:textGlow 2s infinite alternate;

}

@keyframes textGlow{

from{
text-shadow:0 0 10px #00eaff;
}

to{
text-shadow:0 0 30px #00eaff;
}

}

p{

margin-top:15px;
font-size:20px;
opacity:0.8;

}

button{

margin-top:30px;
padding:15px 40px;
font-size:18px;
border:none;
border-radius:30px;
background:#00eaff;
color:black;
cursor:pointer;
transition:.4s;

}

button:hover{

transform:scale(1.1);
background:white;
box-shadow:0 0 20px #00eaff;

}

</style>

</head>

<body>

<div class="container">

<h1>WELCOME</h1>

<p>Goggie's Git Page</p>

<button onclick="enterSite()">Hello!</button>

</div>

<script>

function enterSite(){

alert("Goggie's Git Page!");

}

</script>

</body>

</html>
